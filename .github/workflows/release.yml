name: release

on:
  release:
    types:
      - published
  workflow_dispatch:

jobs:
  build-and-upload:
    name: build-and-upload
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Build package
        run: uv build
      - name: Upload release artifacts
        if: github.event_name == 'release'
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/*

  publish-pypi:
    name: publish-pypi
    needs: build-and-upload
    if: github.event_name == 'release'
    runs-on: ubuntu-latest
    permissions:
      id-token: write
    environment:
      name: pypi
      url: https://pypi.org/p/treefi
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Build package
        run: uv build
      - name: Publish to PyPI
        run: uv publish
